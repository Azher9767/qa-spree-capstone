name: QA Automation Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      RAILS_ENV: development
      NODE_ENV: development

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v6

    # ----------------------------
    # Setup Node for Cypress
    # ----------------------------
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18.16.0
        cache: 'npm'

    - name: Install Node Dependencies
      run: npm install

    # ----------------------------
    # Setup Ruby for Spree
    # ----------------------------
    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2'
        bundler-cache: true

    - name: Install Gems
      run: bundle install

    - name: Setup Database
      run: |
        bundle exec rails db:create
        bundle exec rails db:migrate
        bundle exec rails db:seed

    - name: Start Spree Server
      run: |
        bundle exec rails server -e development -d -p 3000
        sleep 30

    - name: Verify Server is Running
      run: |
        curl --retry 10 --retry-delay 3 --retry-connrefused http://localhost:3000 || (echo "Server failed to start" && exit 1)

    # ----------------------------
    # Run Cypress Tests
    # ----------------------------
    - name: Run Cypress Tests
      run: npx cypress run --browser chrome --headless

    # ----------------------------
    # Setup Java for Selenium
    # ----------------------------
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: temurin
        java-version: 17

    - name: Run Selenium Tests
      run: |
        cd mobile-test
        mvn -B clean test